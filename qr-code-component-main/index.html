<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="design/styles.css">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');
</style>
</head>
<body id="background">
  <div id="container">
    <img src="images/image-qr-code.png" alt="qr_code">
  <p id="p1" class="outfit-p1"><b>Improve your front-end skills by building projects</b></p>
  <p id="p2" class="outfit-p2">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
  </div>
  <footer>
      <div class="outfit-footer">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Mark Vallejo</a>.
      </footer>
  </div>
</body>
</html>
